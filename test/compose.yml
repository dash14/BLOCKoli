services:
  test:
    build:
      context: ..
      dockerfile: test/Dockerfile
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    entrypoint: ["sh", "-c", "pnpm install --frozen-lockfile --config.confirmModulesPurge=false --config.updateNotifier=false && exec \"$@\"", "--"]
    command: ["pnpm", "test:browser"]

volumes:
  node_modules:
