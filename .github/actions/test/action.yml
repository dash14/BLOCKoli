name: 'Lint, Build & Test'
description: 'Run lint, build, unit tests, and browser tests'

runs:
  using: 'composite'
  steps:
    - run: corepack enable
      shell: bash

    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: 'package.json'
        cache: 'pnpm'

    - run: pnpm install --frozen-lockfile
      shell: bash
    - run: pnpm lint
      shell: bash
    - run: pnpm build
      shell: bash

    - name: Run unit tests
      run: pnpm test:unit
      shell: bash

    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        file: test/Dockerfile
        load: true
        tags: test-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        env:
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false

    - name: Run browser tests
      id: browser-tests
      run: pnpm docker:test:browser
      shell: bash

    - name: Upload VRT diff images
      if: failure() && steps.browser-tests.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: vrt-diff-images
        path: .vitest-attachments/
        retention-days: 1
