name: 'Lint, Build & Test'
description: 'Run lint, build, unit tests, and browser tests'

runs:
  using: 'composite'
  steps:
    - run: corepack enable
      shell: bash

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: 'package.json'
        cache: 'pnpm'

    - run: pnpm install --frozen-lockfile
      shell: bash

    - run: pnpm lint
      shell: bash
    - run: pnpm build
      shell: bash

    - name: Run unit tests
      run: pnpm test:unit
      shell: bash

    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        file: test/Dockerfile
        load: true
        tags: test-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
      env:
        DOCKER_BUILD_CHECKS_ANNOTATIONS: 'false'
        DOCKER_BUILD_SUMMARY: 'false'
        DOCKER_BUILD_RECORD_UPLOAD: 'false'

    - name: Run browser tests
      id: browser-tests
      run: pnpm docker:test:browser
      shell: bash

    - name: Upload VRT diff images
      if: failure() && steps.browser-tests.outcome == 'failure'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: vrt-diff-images
        path: .vitest-attachments/
        retention-days: 1
