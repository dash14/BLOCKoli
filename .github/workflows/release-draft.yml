name: Create Draft Release

on:
  workflow_dispatch:

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Check if tag for current version already exists
      - name: Check for existing tag
        run: |
          git fetch --tags
          VERSION=$(node -p "require('./package.json').version")
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: ./.github/actions/test

      - name: Generate attestation
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: 'block-oli_${{ env.VERSION }}.zip'

      - name: Rename attestation bundle
        run: |
          cp "${{ steps.attest.outputs.bundle-path }}" "block-oli_${VERSION}.zip.sigstore.json"

      - name: Create draft release
        run: |
          gh release create "v${VERSION}" \
            --draft \
            --title "v${VERSION}" \
            --generate-notes \
            "block-oli_${VERSION}.zip" \
            "block-oli_${VERSION}.zip.sigstore.json"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
